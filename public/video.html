<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Témoignage vidéo — Témoigne de moi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/theme.css"/>
  <style>
    .video-wrap { background:#000; border-radius:12px; overflow:hidden; aspect-ratio:9/16; max-height:300px; width:100%; position:relative; }
    #preview { width:100%; height:100%; object-fit:cover; display:block; }
    .video-overlay { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-between; padding:10px; pointer-events:none; }
    .overlay-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .overlay-bottom { display:flex; justify-content:center; align-items:flex-end; }
    .rec-badge { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.6); border-radius:20px; padding:4px 10px; opacity:0; transition:opacity .3s; pointer-events:none; }
    .rec-badge.show { opacity:1; }
    .rec-badge-dot { width:8px; height:8px; border-radius:50%; background:var(--warm1); animation:blink 1s step-end infinite; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .rec-time { font-size:13px; font-weight:700; color:#fff; }
    .btn-flip { width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; pointer-events:all; transition:all .2s; }
    .btn-flip:active{transform:scale(.88);}
    .btn-rec-outer { width:66px; height:66px; border-radius:50%; border:3px solid rgba(255,255,255,.7); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; pointer-events:all; margin-bottom:8px; }
    .btn-rec-outer:active{transform:scale(.93);}
    .btn-rec-inner { width:50px; height:50px; border-radius:50%; background:var(--warm1); box-shadow:0 0 16px rgba(232,130,90,.6); transition:all .25s cubic-bezier(.34,1.56,.64,1); }
    .btn-rec-outer.recording .btn-rec-inner { border-radius:7px; width:26px; height:26px; }
    .rec-status { font-size:.68rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); }
    .rec-status.active { color:var(--warm1); }
    .rec-list { display:flex; flex-direction:column; gap:8px; }
    .rec-item { background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:10px 13px; display:flex; align-items:center; gap:10px; animation:itemIn .28s ease; }
    @keyframes itemIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .rdot { width:8px; height:8px; border-radius:50%; background:var(--blue); box-shadow:0 0 8px rgba(91,141,184,.5); flex-shrink:0; transition:background .3s; }
    .rdot.sent { background:var(--green); }
    .rec-info { flex:1; min-width:0; }
    .rec-name { font-size:.75rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rec-meta { font-size:.62rem; color:var(--muted); margin-top:2px; }
    .rec-btns { display:flex; gap:4px; }
    .ib { width:30px; height:30px; border-radius:7px; border:1.5px solid var(--border); background:transparent; color:var(--muted); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .16s; text-decoration:none; flex-shrink:0; }
    .ib:hover { border-color:var(--warm1); color:var(--warm1); }
    .ib.g:hover { border-color:var(--green); color:var(--green); }
    .ib.r:hover { border-color:#d44; color:#d44; }
    .ib.sb { animation:spin .7s linear infinite; border-color:var(--warm1); color:var(--warm1); pointer-events:none; }
  </style>
</head>
<body>
<div class="topbar">
  <a href="/" class="topbar-logo">
    <div class="topbar-icon" id="topbarIcon">
      <svg viewBox="0 0 24 24" fill="white" width="16" height="16"><rect x="10" y="2" width="4" height="20" rx="1"/><rect x="2" y="8" width="20" height="4" rx="1"/></svg>
    </div>
    <span id="topbarTitle">Témoigne de moi</span>
  </a>
</div>

<div class="wrap">
  <a href="/" class="back">← Choisir un autre mode</a>
  <div class="page-header">
    <div class="page-icon" style="background:rgba(91,141,184,.12);">🎥</div>
    <h1>Témoignage vidéo</h1>
    <p>Filmez votre message depuis votre téléphone</p>
  </div>
  <div class="card">
    <div class="field" style="margin-bottom:12px;">
      <label>Votre prénom / nom</label>
      <input type="text" id="senderInput" placeholder="Marie Dupont" maxlength="60" autocomplete="name"/>
    </div>
    <div class="video-wrap">
      <video id="preview" autoplay playsinline muted></video>
      <div class="video-overlay">
        <div class="overlay-top">
          <div class="rec-badge" id="recBadge"><div class="rec-badge-dot"></div><span class="rec-time" id="recTime">00:00</span></div>
          <button class="btn-flip" onclick="flipCam()">⇄</button>
        </div>
        <div class="overlay-bottom">
          <div><div class="btn-rec-outer" id="btnRecOuter" onclick="toggleRec()"><div class="btn-rec-inner"></div></div></div>
        </div>
      </div>
    </div>
    <div class="rec-status" id="recStatus" style="text-align:center;margin-top:10px;">Prêt à enregistrer</div>
  </div>
  <div class="card" id="listCard" style="display:none;">
    <div class="card-title">Vidéos enregistrées</div>
    <div class="rec-list" id="recList"></div>
    <button class="btn btn-primary" style="margin-top:12px;" id="btnSendAll" onclick="sendAll()">↗ Envoyer tout</button>
  </div>
</div>

<a href="/feedback?type=video" class="feedback-fab" onclick="sessionStorage.setItem('tdm_type','video')">
  <span class="fi">⭐</span> Je donne mon avis
</a>
<div class="toast" id="toast"></div>

<script>
let recs=[],mr=null,chunks=[],sec=0,tInt=null,recOn=false,stream=null,facing='user';

fetch('/api/config').then(r=>r.json()).then(c=>{
  if(c.appTitle) document.getElementById('topbarTitle').textContent=c.appTitle;
  if(c.logoDataUrl) document.getElementById('topbarIcon').innerHTML=`<img src="${c.logoDataUrl}" style="width:22px;height:22px;border-radius:4px;object-fit:cover;">`;
}).catch(()=>{});

async function initCam(f='user'){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:f,width:{ideal:1280},height:{ideal:720}},audio:true});document.getElementById('preview').srcObject=stream;facing=f;}
  catch{toast('Caméra inaccessible.','err');}
}
async function flipCam(){if(recOn)return;await initCam(facing==='user'?'environment':'user');}
async function toggleRec(){recOn?stopRec():await startRec();}
async function startRec(){
  if(!stream){await initCam();if(!stream)return;}
  const mime=['video/webm;codecs=vp9,opus','video/webm','video/mp4'].find(t=>MediaRecorder.isTypeSupported(t))||'';
  mr=new MediaRecorder(stream,mime?{mimeType:mime}:{});chunks=[];
  mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};mr.onstop=finalize;mr.start(200);
  recOn=true;sec=0;setTimer(0);
  document.getElementById('recBadge').classList.add('show');
  document.getElementById('btnRecOuter').classList.add('recording');
  document.getElementById('recStatus').textContent='Enregistrement en cours…';
  document.getElementById('recStatus').classList.add('active');
  tInt=setInterval(()=>{sec++;setTimer(sec);},1000);
}
function stopRec(){
  mr?.stop();clearInterval(tInt);recOn=false;
  document.getElementById('recBadge').classList.remove('show');
  document.getElementById('btnRecOuter').classList.remove('recording');
  document.getElementById('recStatus').textContent='Prêt à enregistrer';
  document.getElementById('recStatus').classList.remove('active');
}
function finalize(){
  const blob=new Blob(chunks,{type:chunks[0]?.type||'video/webm'});
  const ext=blob.type.includes('mp4')?'.mp4':'.webm';
  const now=new Date();const name=`video_${fDate(now)}_${fTime(now)}${ext}`;
  const mb=(blob.size/1024/1024).toFixed(1);
  recs.push({blob,url:URL.createObjectURL(blob),name,date:now,dur:sec,mb,sent:false});
  render();toast(`Enregistrée : ${name} (${mb} MB)`,'inf');
}
function render(){
  const card=document.getElementById('listCard');if(!recs.length){card.style.display='none';return;}
  card.style.display='block';document.getElementById('recList').innerHTML='';
  recs.forEach((r,i)=>{
    const dur=`${p(Math.floor(r.dur/60))}:${p(r.dur%60)}`;
    const el=document.createElement('div');el.className='rec-item';
    el.innerHTML=`<div class="rdot${r.sent?' sent':''}" id="rd-${i}"></div><div class="rec-info"><div class="rec-name">${r.name}</div><div class="rec-meta">${r.date.toLocaleDateString('fr-FR')} · ${dur} · ${r.mb} MB</div></div><div class="rec-btns"><button class="ib" onclick="playVid(${i})">▶</button><button class="ib g" onclick="sendOne(${i})" id="sb-${i}">↗</button><a class="ib" href="${r.url}" download="${r.name}">↓</a><button class="ib r" onclick="delRec(${i})">✕</button></div>`;
    document.getElementById('recList').appendChild(el);
  });
}
function playVid(i){const w=window.open('','_blank');w.document.write(`<video src="${recs[i].url}" controls autoplay style="max-width:100%;max-height:100vh;background:#000;display:block;margin:auto;"></video>`);}
function delRec(i){URL.revokeObjectURL(recs[i].url);recs.splice(i,1);render();}
async function sendOne(i){
  const btn=document.getElementById(`sb-${i}`);btn.classList.add('sb');btn.textContent='↻';
  try{await doSend(recs[i]);recs[i].sent=true;btn.classList.remove('sb');btn.textContent='✓';btn.style.color='var(--green)';btn.style.borderColor='var(--green)';document.getElementById(`rd-${i}`)?.classList.add('sent');toast('Envoyée','ok');}
  catch(e){btn.classList.remove('sb');btn.textContent='↗';toast('Erreur : '+e.message,'err');}
}
async function sendAll(){
  const btn=document.getElementById('btnSendAll');btn.disabled=true;btn.innerHTML='<span class="spin">↻</span> Envoi…';
  let ok=0;for(let i=0;i<recs.length;i++){try{await doSend(recs[i]);recs[i].sent=true;ok++;}catch{}render();}
  btn.disabled=false;btn.innerHTML='↗ Envoyer tout';toast(`${ok}/${recs.length} envoyée(s)`,ok===recs.length?'ok':'inf');
}
async function doSend(rec){
  const sender=document.getElementById('senderInput').value.trim()||'Anonyme';
  const fd=new FormData();fd.append('video',rec.blob,rec.name);fd.append('filename',rec.name);fd.append('sender',sender);fd.append('date',rec.date.toLocaleString('fr-FR'));fd.append('duration',`${p(Math.floor(rec.dur/60))}:${p(rec.dur%60)}`);
  const res=await fetch('/api/send/video',{method:'POST',body:fd});const json=await res.json();
  if(!json.ok)throw new Error(json.error||`HTTP ${res.status}`);
}
function setTimer(s){document.getElementById('recTime').textContent=`${p(Math.floor(s/60))}:${p(s%60)}`;}
function fDate(d){return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function fTime(d){return `${p(d.getHours())}h${p(d.getMinutes())}m${p(d.getSeconds())}s`;}
function p(n){return String(n).padStart(2,'0');}
let tT;function toast(msg,type='inf'){const el=document.getElementById('toast');el.className=`toast ${type} show`;el.textContent=msg;clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),3500);}
initCam('user');
</script>
</body>
</html>
