<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Témoignage écrit — Témoigne de moi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/theme.css"/>
  <style>
    /* Onglets modes */
    .mode-tabs { display:flex; border-bottom:1.5px solid var(--border); background:var(--card); border-radius:var(--r) var(--r) 0 0; overflow:hidden; }
    .mode-tab { flex:1; padding:11px 8px; text-align:center; font-size:.72rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .18s; }
    .mode-tab.active { color:var(--green); border-bottom-color:var(--green); background:rgba(107,174,142,.04); }
    .mode-tab:hover { color:var(--text); }

    /* TinyMCE */
    .tox-wrap { border-radius:0 0 var(--r) var(--r); overflow:hidden; border:1.5px solid var(--border); border-top:none; }
    .tox-wrap .tox.tox-tinymce { border:none !important; height:340px !important; }

    /* Dictée vocale */
    .voice-panel { display:none; border:1.5px solid var(--border); border-top:none; border-radius:0 0 var(--r) var(--r); background:var(--card); padding:18px; }
    .voice-panel.active { display:block; }

    .btn-voice {
      width:64px; height:64px; border-radius:50%; border:none;
      cursor:pointer; background:linear-gradient(145deg,var(--warm1),#c4613a);
      display:flex; align-items:center; justify-content:center; font-size:26px;
      box-shadow:0 0 0 5px rgba(232,130,90,.12),0 6px 20px rgba(232,130,90,.38);
      transition:all .22s cubic-bezier(.34,1.56,.64,1); margin:0 auto;
    }
    .btn-voice:active { transform:scale(.92); }
    .btn-voice.listening { background:var(--bg); border:2px solid var(--warm1); animation:vPulse 1.5s ease-in-out infinite; }
    @keyframes vPulse{0%,100%{box-shadow:0 0 0 5px rgba(232,130,90,.08),0 0 30px rgba(232,130,90,.2)}50%{box-shadow:0 0 0 12px rgba(232,130,90,.03),0 0 50px rgba(232,130,90,.25)}}

    .voice-status { font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); text-align:center; margin-top:10px; }
    .voice-status.on { color:var(--warm1); }

    .lang-sel { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:.82rem; padding:7px 10px; outline:none; cursor:pointer; }

    .transcript-live {
      margin-top:12px; padding:12px 14px;
      background:var(--bg); border:1.5px solid var(--border);
      border-radius:10px; font-size:.84rem; color:var(--muted);
      min-height:48px; font-style:italic; line-height:1.6;
      transition:color .2s;
    }
    .transcript-live.has { color:var(--text); font-style:normal; }

    .voice-controls { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  </style>
</head>
<body>
<div class="topbar">
  <a href="/" class="topbar-logo">
    <div class="topbar-icon" id="topbarIcon">
      <svg viewBox="0 0 24 24" fill="white" width="16" height="16"><rect x="10" y="2" width="4" height="20" rx="1"/><rect x="2" y="8" width="20" height="4" rx="1"/></svg>
    </div>
    <span id="topbarTitle">Témoigne de moi</span>
  </a>
</div>

<div class="wrap">
  <a href="/" class="back">← Choisir un autre mode</a>

  <div class="page-header">
    <div class="page-icon" style="background:rgba(107,174,142,.12);">✍️</div>
    <h1>Témoignage écrit</h1>
    <p>Rédigez ou dictez librement votre message</p>
  </div>

  <!-- Infos auteur -->
  <div class="card">
    <div class="field">
      <label>Votre prénom / nom</label>
      <input type="text" id="senderInput" placeholder="Marie Dupont" maxlength="60" autocomplete="name"/>
    </div>
    <div class="field" style="margin-bottom:0;">
      <label>Titre de votre témoignage</label>
      <input type="text" id="subjectInput" placeholder="En quelques mots…" maxlength="80"/>
    </div>
  </div>

  <!-- Onglets Rédaction / Dictée -->
  <div style="border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);">
    <div class="mode-tabs">
      <div class="mode-tab active" id="tabWrite" onclick="switchTab('write')">✏️ Rédaction</div>
      <div class="mode-tab" id="tabVoice" onclick="switchTab('voice')">🎙 Dictée vocale</div>
    </div>

    <!-- TinyMCE -->
    <div class="tox-wrap" id="writePanel">
      <textarea id="editor"></textarea>
    </div>

    <!-- Dictée vocale -->
    <div class="voice-panel" id="voicePanel">
      <div class="voice-controls">
        <select class="lang-sel" id="langSel">
          <option value="fr-FR">🇫🇷 Français</option>
          <option value="en-US">🇺🇸 English</option>
          <option value="es-ES">🇪🇸 Español</option>
          <option value="de-DE">🇩🇪 Deutsch</option>
          <option value="it-IT">🇮🇹 Italiano</option>
          <option value="pt-PT">🇵🇹 Português</option>
          <option value="ar-SA">🇸🇦 العربية</option>
        </select>
        <div style="font-size:.72rem;color:var(--muted);max-width:200px;line-height:1.5;">
          La parole est transcrite directement dans l'éditeur
        </div>
      </div>

      <button class="btn-voice" id="btnVoice" onclick="toggleVoice()">🎙</button>
      <div class="voice-status" id="voiceStatus">Appuyer pour dicter</div>

      <!-- Aperçu interim -->
      <div class="transcript-live" id="transcriptLive">En attente de la parole…</div>
    </div>
  </div>

  <!-- Bouton envoi -->
  <button class="btn btn-primary" id="btnSend" onclick="send()">✉️ Envoyer mon témoignage</button>
</div>

<a href="/feedback?type=ecrit" class="feedback-fab" onclick="sessionStorage.setItem('tdm_type','ecrit')">
  <span class="fi">⭐</span> Je donne mon avis
</a>
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────
fetch('/api/config').then(r=>r.json()).then(c=>{
  if(c.appTitle)   document.getElementById('topbarTitle').textContent=c.appTitle;
  if(c.logoDataUrl) document.getElementById('topbarIcon').innerHTML=`<img src="${c.logoDataUrl}" style="width:22px;height:22px;border-radius:4px;object-fit:cover;">`;
  // Charger TinyMCE avec la bonne clé
  loadTiny(c.tinymceKey||'no-api-key');
}).catch(()=>loadTiny('no-api-key'));

// ── TinyMCE ───────────────────────────────────────────────────────
function loadTiny(key){
  const s=document.createElement('script');
  s.src=`https://cdn.tiny.cloud/1/${key}/tinymce/8/tinymce.min.js`;
  s.referrerPolicy='origin'; s.crossOrigin='anonymous';
  s.onload=initEditor;
  document.head.appendChild(s);
}

function initEditor(){
  tinymce.init({
    selector:'#editor', menubar:false, statusbar:false, resize:false,
    plugins:['autolink','lists','link','searchreplace','wordcount','emoticons'],
    toolbar:'undo redo | styles | bold italic underline | forecolor | alignleft aligncenter alignright | bullist numlist | link | emoticons | removeformat',
    skin:'oxide',
    content_style:'body{font-family:"Segoe UI",Arial,sans-serif;font-size:15px;line-height:1.78;color:#2A1F1A;background:#FDF6F0;padding:16px 20px;margin:0;}p{margin:0 0 10px;}',
    placeholder:'Partagez votre expérience…',
  });
}

// ── Onglets ───────────────────────────────────────────────────────
let currentTab = 'write';
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabWrite').classList.toggle('active', tab==='write');
  document.getElementById('tabVoice').classList.toggle('active', tab==='voice');
  document.getElementById('writePanel').style.display = tab==='write' ? 'block' : 'none';
  document.getElementById('voicePanel').classList.toggle('active', tab==='voice');
  if(tab==='write') setTimeout(()=>tinymce.get('editor')?.focus(), 80);
}

// ── Web Speech API ────────────────────────────────────────────────
let recog=null, listening=false;

function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Dictée non supportée. Utilisez Chrome.','err');return false;}
  recog=new SR();
  recog.continuous=true; recog.interimResults=true;
  recog.lang=document.getElementById('langSel').value;
  recog.onstart=()=>{listening=true;setVoiceUI(true);};
  recog.onend=()=>{ if(listening){try{recog.start();}catch{stopVoice();}} };
  recog.onerror=e=>{
    if(e.error==='no-speech')return;
    if(e.error==='not-allowed'){toast('Microphone refusé.','err');stopVoice();}
  };
  recog.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal){
        // Insérer dans TinyMCE
        const ed=tinymce.get('editor');
        if(ed) ed.execCommand('mceInsertContent',false,t+' ');
      } else { interim+=t; }
    }
    const live=document.getElementById('transcriptLive');
    live.textContent=interim||'En attente de la parole…';
    live.classList.toggle('has',!!interim);
  };
  return true;
}

function toggleVoice(){ listening?stopVoice():startVoice(); }

function startVoice(){
  if(!recog&&!initSpeech())return;
  recog.lang=document.getElementById('langSel').value;
  try{recog.start();toast('Dictée démarrée','inf');}catch(e){}
}

function stopVoice(){
  listening=false;
  try{recog?.stop();}catch{}
  setVoiceUI(false);
  const live=document.getElementById('transcriptLive');
  live.textContent='En attente de la parole…';
  live.classList.remove('has');
  toast('Dictée terminée','ok');
}

function setVoiceUI(on){
  document.getElementById('btnVoice').textContent=on?'⏹':'🎙';
  document.getElementById('btnVoice').classList.toggle('listening',on);
  document.getElementById('voiceStatus').textContent=on?'Enregistrement en cours…':'Appuyer pour dicter';
  document.getElementById('voiceStatus').classList.toggle('on',on);
}

// ── Envoi ─────────────────────────────────────────────────────────
async function send(){
  // Arrêter la dictée si en cours
  if(listening) stopVoice();

  const ed=tinymce.get('editor');
  if(!ed){toast('Éditeur non chargé.','err');return;}
  const html=ed.getContent();
  const text=ed.getContent({format:'text'});
  if(!text.trim()){toast('Veuillez rédiger votre témoignage.','err');return;}

  const sender=document.getElementById('senderInput').value.trim()||'Anonyme';
  const subject=document.getElementById('subjectInput').value.trim();
  const btn=document.getElementById('btnSend');
  btn.disabled=true; btn.innerHTML='<span class="spin">↻</span> Envoi…';

  try{
    const res=await fetch('/api/send/ecrit',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sender,subject,htmlContent:html,textContent:text}),
    });
    const json=await res.json();
    if(!json.ok)throw new Error(json.error);
    sessionStorage.setItem('tdm_type','ecrit');
    sessionStorage.setItem('tdm_author',sender);
    window.location.href='/feedback?type=ecrit&author='+encodeURIComponent(sender);
  }catch(e){
    btn.disabled=false; btn.innerHTML='✉️ Envoyer mon témoignage';
    toast('Erreur : '+e.message,'err');
  }
}

let tT;
function toast(msg,type='inf'){const el=document.getElementById('toast');el.className=`toast ${type} show`;el.textContent=msg;clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),3500);}
</script>
</body>
</html>
